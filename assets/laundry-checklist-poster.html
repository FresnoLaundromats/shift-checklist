<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laundry Checklist QR Poster</title>
    <style>
      :root { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #18211c; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #eef8ff; }
      main { position: relative; width: min(7.5in, calc(100vw - 32px)); min-height: 9.5in; display: grid; align-content: center; gap: 18px; padding: .42in; overflow: hidden; background: linear-gradient(180deg, #f7fcff, #eaf7ff); border: 2px solid #c9e8fa; border-radius: 18px; box-shadow: 0 22px 60px rgba(36, 50, 134, .12); }
      main::before, main::after { content: ""; position: absolute; border: 2px solid rgba(255,255,255,.8); border-radius: 999px; background: rgba(255,255,255,.26); }
      main::before { width: 1.1in; height: 1.1in; right: .42in; top: .42in; }
      main::after { width: .68in; height: .68in; left: .5in; bottom: .58in; }
      .logos { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: .18in; }
      .dirty { width: 1.08in; height: auto; }
      .superclean { width: .84in; height: auto; }
      h1 { position: relative; z-index: 1; margin: 0; color: #18211c; font-size: 48px; line-height: .96; letter-spacing: 0; text-align: center; }
      p { position: relative; z-index: 1; margin: 0; color: #4d5d56; font-size: 19px; font-weight: 800; line-height: 1.35; text-align: center; }
      .qr-wrap { position: relative; z-index: 1; display: grid; place-items: center; width: min(4.8in, 100%); justify-self: center; padding: .22in; border: 2px dashed #b8ddf2; border-radius: 24px; background: rgba(255,255,255,.72); }
      .qr { width: 100%; }
      .url { color: #24513f; font-size: 13px; overflow-wrap: anywhere; }
      .note { color: #6d7b72; font-size: 15px; }
      @media print { body { background: #fff; } main { box-shadow: none; width: auto; min-height: auto; } }
    </style>
  </head>
  <body>
    <main>
      <div class="logos">
        <img class="dirty" src="dirty-bird-basket.png" alt="Dirty Bird" />
        <img class="superclean" src="superclean-clean.png" alt="SuperClean" />
      </div>
      <h1>Store Checklist</h1>
      <p>Scan before leaving the store. Complete the checklist and upload required photos.</p>
      <div class="qr-wrap">
        <img class="qr" src="laundry-checklist-qr.svg" alt="QR code for store checklist" />
      </div>
      <p class="url">http://192.168.1.117:4173</p>
      <p class="note">Soap dishes and lint traps need photos.</p>
    </main>
  </body>
</html>
